<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <title>LOOP</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
        font-size: 28px;
        font-weight: 800;
        color: #fff;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 8px;
      }
      p {
        color: #94a3b8;
        line-height: 1.5;
        font-size: 0.95rem;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #1e293b;
        border-top-color: #3b82f6;
        border-radius: 50%;
        margin: 24px auto 0;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">L</div>
      <h1>LOOP Yükleniyor</h1>
      <p>Akıllı lojistik vitrininiz açılıyor…</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </body>
</html>

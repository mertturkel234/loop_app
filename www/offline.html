<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <title>LOOP — Bağlantı Yok</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
        font-size: 28px;
        font-weight: 800;
        color: #fff;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 8px;
      }
      p {
        color: #94a3b8;
        line-height: 1.5;
        font-size: 0.95rem;
        margin-bottom: 24px;
      }
      button {
        appearance: none;
        border: none;
        background: #3b82f6;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        padding: 14px 28px;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
      }
      button:active {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">L</div>
      <h1>İnternet bağlantısı yok</h1>
      <p>
        LOOP vitrinine bağlanılamadı. Lütfen bağlantınızı kontrol edip tekrar
        deneyin.
      </p>
      <button type="button" onclick="location.reload()">Yeniden Dene</button>
    </div>
  </body>
</html>
